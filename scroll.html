<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Container Scroll Animation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <style>
        body {
            background-color: white;
            margin: 0;
            overflow-x: hidden;
        }

        /* Gradient Text: Bottom Black to Top Grey */
        .gradient-text {
            background: linear-gradient(to top, #000000, #666666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Perspective container for the 3D flip */
        .perspective-container {
            perspective: 1000px;
        }

        .scroll-card {
            transform-style: preserve-3d;
            box-shadow: 0 0 #0000004d, 0 9px 20px #0000004a, 0 37px 37px #00000042, 0 84px 50px #00000026;
        }
    </style>
</head>
<body>

    <div class="h-[50vh]"></div>

    <section id="animation-container" class="relative min-h-screen flex flex-col items-center justify-center py-20 px-4 md:px-20">
        
        <div id="header" class="text-center mb-10 z-10">
            <h2 class="text-2xl md:text-4xl font-semibold text-black mb-2">
                Unleash the power of
            </h2>
            <h1 class="gradient-text text-5xl md:text-8xl font-bold leading-none">
                Scroll Animations
            </h1>
        </div>

        <div class="perspective-container w-full max-w-5xl">
            <div id="card" class="scroll-card w-full h-[30rem] md:h-[45rem] bg-[#222222] border-[6px] border-[#6C6C6C] rounded-[30px] p-2 md:p-4 overflow-hidden">
                <div class="w-full h-full rounded-2xl overflow-hidden bg-zinc-900">
                    <img 
                        src="https://ui.aceternity.com/_next/image?url=%2Flinear.webp&w=3840&q=75" 
                        alt="Hero Image" 
                        class="w-full h-full object-cover object-top"
                    />
                </div>
            </div>
        </div>

    </section>

    <div class="h-screen"></div>

    <script>
        // Register GSAP Plugin
        gsap.registerPlugin(ScrollTrigger);

        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: "#animation-container",
                start: "top center", // Animation starts when container reaches middle of viewport
                end: "bottom center", // Ends when container bottom hits middle
                scrub: 1,            // Smoothly ties animation to scroll position
                pin: false           // Change to true if you want the section to "stick" while animating
            }
        });

        // 1. Animate Header upwards
        tl.to("#header", {
            y: -100,
            duration: 1
        }, 0);

        // 2. Animate Card from 20deg tilt to 0deg (flat) and scale up/down
        tl.fromTo("#card", 
            { 
                rotateX: 20, 
                scale: 1.05 
            }, 
            { 
                rotateX: 0, 
                scale: 1, 
                duration: 1 
            }, 
            0
        );
    </script>
</body>
</html>
