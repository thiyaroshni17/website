<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stacked Animated Cards</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(25, 25, 25, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-blue: #3b82f6;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            color: white;
        }

        /* Container for the stack */
        .stack-container {
            display: grid;
            grid-template-areas: "stack";
            place-items: center;
        }

        /* Individual Card Styling */
        .card {
            grid-area: stack;
            position: relative;
            width: 22rem;
            height: 9rem;
            padding: 1rem 1.25rem;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transform: skewY(-8deg);
            /* The signature tilt */
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            overflow: hidden;
            filter: grayscale(100%);
        }

        /* The Fade-out effect on the right */
        .card::after {
            content: '';
            position: absolute;
            top: -5%;
            right: -1px;
            height: 110%;
            width: 12rem;
            background: linear-gradient(to left, var(--bg-color), transparent);
            pointer-events: none;
        }

        /* Hover States */
        .card:hover {
            filter: grayscale(0%);
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(45, 45, 45, 0.95);
         

            /* Bring hovered card to very front */
        }

        /* Positioning the cards in the stack */
        .card-1 {
            transform: skewY(-8deg) translate(0, 0);
            z-index: 1;
        }

        .card-2 {
            transform: skewY(-8deg) translate(4rem, 2.5rem);
            z-index: 2;
        }

        .card-3 {
            transform: skewY(-8deg) translate(8rem, 5rem);
            filter: grayscale(0%);
            z-index: 3;
        }

        .card-4 {
            transform: skewY(-8deg) translate(12rem, 7.5rem);
            z-index: 4;
        }

        .card-5 {
            transform: skewY(-8deg) translate(16rem, 10rem);
            z-index: 5;
        }

        /* Animation offsets on hover - moving much higher */
        .card-1:hover {
            transform: skewY(-8deg) translate(0, -4rem);
        }

        .card-2:hover {
            transform: skewY(-8deg) translate(4rem, -2.5rem);
        }

        .card-3:hover {
            transform: skewY(-8deg) translate(8rem, -1rem);
        }

        .card-4:hover {
            transform: skewY(-8deg) translate(12rem, 1.5rem);
        }

        .card-5:hover {
            transform: skewY(-8deg) translate(16rem, 4rem);
        }

        /* Card Content */
        .header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .icon-wrapper {
            background: #1e3a8a;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .title {
            color: var(--accent-blue);
            font-weight: 600;
            font-size: 1.125rem;
            margin: 0;
        }

        .desc {
            font-size: 1.125rem;
            margin: 0;
            white-space: nowrap;
        }

        .date {
            color: #71717a;
            font-size: 0.875rem;
            margin: 0;
        }

        svg {
            width: 16px;
            height: 16px;
            color: #93c5fd;
        }
    </style>
</head>

<body>

    <div class="stack-container">
        <div class="card card-1">
            <div class="header">
                <div class="icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path
                            d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />
                    </svg>
                </div>
                <p class="title">Featured</p>
            </div>
            <p class="desc">Discover amazing content</p>
            <p class="date">Just now</p>
        </div>

        <div class="card card-2">
            <div class="header">
                <div class="icon-wrapper" style="background: #3f3f46;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path
                            d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />
                    </svg>
                </div>
                <p class="title" style="color: #a1a1aa;">Popular</p>
            </div>
            <p class="desc">Trending across the globe</p>
            <p class="date">2 days ago</p>
        </div>

        <div class="card card-3">
            <div class="header">
                <div class="icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path
                            d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />
                    </svg>
                </div>
                <p class="title">New</p>
            </div>
            <p class="desc">Latest updates and features</p>
            <p class="date">Today</p>
        </div>

        <div class="card card-4">
            <div class="header">
                <div class="icon-wrapper" style="background: #1e3a8a;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path
                            d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />
                    </svg>
                </div>
                <p class="title">Trending</p>
            </div>
            <p class="desc">What everyone is talking about</p>
            <p class="date">1 hour ago</p>
        </div>

        <div class="card card-5">
            <div class="header">
                <div class="icon-wrapper" style="background: #3f3f46;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path
                            d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />
                    </svg>
                </div>
                <p class="title" style="color: #a1a1aa;">Latest</p>
            </div>
            <p class="desc">Freshly delivered updates</p>
            <p class="date">Just now</p>
        </div>
    </div>

</body>

</html>
