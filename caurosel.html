<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure CSS 7-Card Carousel</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            max-width: 800px;
            max-height: 600px;
            display: flex;
            transform-style: preserve-3d;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* Hide Radio Buttons */
        input[type=radio] {
            display: none;
        }

        .cards {
            position: relative;
            width: 300px;
            height: 400px;
            perspective: 1000px;
            transform-style: preserve-3d;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            right: 0;
            margin: auto;
            transition: transform 0.4s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            font-size: 2rem;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Card Colors */
        .card:nth-child(1) {
            background: #e74c3c;
        }

        .card:nth-child(2) {
            background: #3498db;
        }

        .card:nth-child(3) {
            background: #2ecc71;
        }

        .card:nth-child(4) {
            background: #f1c40f;
        }

        .card:nth-child(5) {
            background: #9b59b6;
        }

        .card:nth-child(6) {
            background: #e67e22;
        }

        .card:nth-child(7) {
            background: #1abc9c;
        }

        /* Logic for 7 Cards Positioning */
        /* Active Card (item 4 selected) */
        #item-4:checked~.cards #song-4,
        #item-1:checked~.cards #song-1,
        #item-2:checked~.cards #song-2,
        #item-3:checked~.cards #song-3,
        #item-5:checked~.cards #song-5,
        #item-6:checked~.cards #song-6,
        #item-7:checked~.cards #song-7 {
            transform: translatex(0) scale(1);
            opacity: 1;
            z-index: 5;
        }

        /* Offset 1 (Immediate neighbors) */
        #item-1:checked~.cards #song-7,
        #item-1:checked~.cards #song-2,
        #item-2:checked~.cards #song-1,
        #item-2:checked~.cards #song-3,
        #item-3:checked~.cards #song-2,
        #item-3:checked~.cards #song-4,
        #item-4:checked~.cards #song-3,
        #item-4:checked~.cards #song-5,
        #item-5:checked~.cards #song-4,
        #item-5:checked~.cards #song-6,
        #item-6:checked~.cards #song-5,
        #item-6:checked~.cards #song-7,
        #item-7:checked~.cards #song-6,
        #item-7:checked~.cards #song-1 {
            transform: translatex(-40%) scale(0.8);
            opacity: 0.6;
            z-index: 4;
        }

        /* Specific right-side offset 1 */
        #item-1:checked~.cards #song-2,
        #item-2:checked~.cards #song-3,
        #item-3:checked~.cards #song-4,
        #item-4:checked~.cards #song-5,
        #item-5:checked~.cards #song-6,
        #item-6:checked~.cards #song-7,
        #item-7:checked~.cards #song-1 {
            transform: translatex(40%) scale(0.8);
        }

        /* Offset 2 */
        #item-1:checked~.cards #song-6,
        #item-1:checked~.cards #song-3,
        #item-2:checked~.cards #song-7,
        #item-2:checked~.cards #song-4,
        #item-3:checked~.cards #song-1,
        #item-3:checked~.cards #song-5,
        #item-4:checked~.cards #song-2,
        #item-4:checked~.cards #song-6,
        #item-5:checked~.cards #song-3,
        #item-5:checked~.cards #song-7,
        #item-6:checked~.cards #song-4,
        #item-6:checked~.cards #song-1,
        #item-7:checked~.cards #song-5,
        #item-7:checked~.cards #song-2 {
            transform: translatex(-70%) scale(0.6);
            opacity: 0.3;
            z-index: 3;
        }

        /* Specific right-side offset 2 */
        #item-1:checked~.cards #song-3,
        #item-2:checked~.cards #song-4,
        #item-3:checked~.cards #song-5,
        #item-4:checked~.cards #song-6,
        #item-5:checked~.cards #song-7,
        #item-6:checked~.cards #song-1,
        #item-7:checked~.cards #song-2 {
            transform: translatex(70%) scale(0.6);
        }

        /* Offset 3 (Furthest visible) */
        #item-4:checked~.cards #song-1,
        #item-4:checked~.cards #song-7,
        #item-1:checked~.cards #song-5,
        #item-1:checked~.cards #song-4 {
            transform: translatex(-90%) scale(0.4);
            opacity: 0.1;
            z-index: 2;
        }

        /* (Simplified remaining positions for brevity - they collapse into the background) */
        .card:not(:checked) {
            opacity: 0;
        }
    </style>
</head>

<body>

    <div class="container">
        <input type="radio" name="slider" id="item-1">
        <input type="radio" name="slider" id="item-2">
        <input type="radio" name="slider" id="item-3">
        <input type="radio" name="slider" id="item-4" checked>
        <input type="radio" name="slider" id="item-5">
        <input type="radio" name="slider" id="item-6">
        <input type="radio" name="slider" id="item-7">

        <div class="cards">
            <label class="card" for="item-1" id="song-1">1</label>
            <label class="card" for="item-2" id="song-2">2</label>
            <label class="card" for="item-3" id="song-3">3</label>
            <label class="card" for="item-4" id="song-4">4</label>
            <label class="card" for="item-5" id="song-5">5</label>
            <label class="card" for="item-6" id="song-6">6</label>
            <label class="card" for="item-7" id="song-7">7</label>
        </div>
    </div>

    <script>
        let currentIndex = 3; // Starting from the checked item-4
        const totalItems = 7;
        const intervalTime = 2000;

        function autoPlay() {
            currentIndex++;
            if (currentIndex > totalItems) {
                currentIndex = 1;
            }
            document.getElementById(`item-${currentIndex}`).checked = true;
        }

        let slideInterval = setInterval(autoPlay, intervalTime);

        // Pause auto-play on hover/interaction if desired, or reset timer on manual click
        const cardsContainer = document.querySelector('.container');
        cardsContainer.addEventListener('mouseenter', () => clearInterval(slideInterval));
        cardsContainer.addEventListener('mouseleave', () => slideInterval = setInterval(autoPlay, intervalTime));

        // Update currentIndex if user manual clicks
        document.querySelectorAll('input[type="radio"]').forEach((radio, index) => {
            radio.addEventListener('change', () => {
                currentIndex = index + 1;
            });
        });
    </script>
</body>

</html>
